name: Build

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Checkout Pico SDK
        uses: actions/checkout@v4
        with:
          repository: raspberrypi/pico-sdk
          ref: '2.2.0'
          path: pico-sdk
          submodules: true

      - name: Checkout pimoroni-pico
        uses: actions/checkout@v4
        with:
          repository: pimoroni/pimoroni-pico
          path: pimoroni-pico

      - name: Checkout presto
        uses: actions/checkout@v4
        with:
          repository: pimoroni/presto
          path: presto

      - name: Install Arm GNU Toolchain
        uses: carlosperate/arm-none-eabi-gcc-action@v1
        with:
          release: '13.3.Rel1'

      - name: Install build tools
        run: sudo apt-get update -q && sudo apt-get install -y cmake ccache

      - name: Cache ccache
        uses: actions/cache@v4
        with:
          path: ~/.ccache
          key: ccache-${{ runner.os }}-${{ github.sha }}
          restore-keys: ccache-${{ runner.os }}-

      - name: Create dummy wifi.h
        run: cp src/wifi.h.example src/wifi.h

      - name: Configure
        run: |
          cmake -B build \
            -DCMAKE_BUILD_TYPE=Release \
            -DPICO_SDK_PATH=${{ github.workspace }}/pico-sdk \
            -DPIMORONI_PICO_PATH=${{ github.workspace }}/pimoroni-pico \
            -DPIMORONI_PRESTO_PATH=${{ github.workspace }}/presto \
            -DCMAKE_C_COMPILER_LAUNCHER=ccache \
            -DCMAKE_CXX_COMPILER_LAUNCHER=ccache

      - name: Build
        run: cmake --build build --parallel $(nproc)

