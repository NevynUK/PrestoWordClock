name: Run Checks

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  run-checks:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install tools
        run: sudo apt-get update -q && sudo apt-get install -y cppcheck clang-format

      - name: Run checks
        run: ./run-checks.sh
